<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kubescout — Problematic Pods</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%2306b6d4%22/%3E%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%23ec4899%22/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2212%22%20fill%3D%22%23050505%22/%3E%3Cpath%20d%3D%22M18%2042V22h8v20h-8zm12%200V14h8v28h-8zm12%200V30h8v12h-8z%22%20fill%3D%22url(%23g)%22/%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2218%22%20r%3D%226%22%20fill%3D%22%23f97316%22/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/dashboard/css/shared/base.css?{{CSS_HASH}}" />
  <link rel="stylesheet" href="/dashboard/css/themes/cyberpunk.css?{{CSS_HASH}}" />
  <link rel="stylesheet" href="/dashboard/css/pod-details.css?{{CSS_HASH}}" />

  <!-- Vue 3 CDN (loaded before module scripts) -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="no-transition" data-theme="dark">
  <!-- Animated Background -->
  <div class="cyber-bg">
    <div class="grid-overlay"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="glow-orb glow-orb-3"></div>
  </div>

  <!-- Theme Badge (upper left corner) -->
  <div class="theme-badge" id="themeBadge"></div>

  <!-- Floating Refresh Button -->
  <button type="button" class="floating-refresh" id="floatingRefresh" title="Refresh">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/>
      <polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
  </button>

  <!-- Notification Container -->
  <div class="notification-container" id="notificationContainer"></div>

  <!-- Dashboard Container -->
  <div class="dashboard-container">
    <!-- Header -->
    <div class="dashboard-header">
      <div class="header-content">
        <h1 class="glitch-text" data-text="PROBLEMATIC PODS">PROBLEMATIC PODS</h1>
        <div class="header-subtitle">
          <span class="pulse-dot"></span>
          <span>LIVE MONITORING • PROBLEM DETECTION</span>
        </div>
      </div>
      <div class="meta-info">
        Showing only pods with <span style="color: var(--accent-red)">BAD</span> or <span style="color: var(--accent-yellow)">WARNING</span> status.
      </div>
      <div style="margin-top: 12px;">
        <a href="/dashboard-local" class="cyber-button" style="text-decoration: none; display: inline-block;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Back to Dashboard
        </a>
      </div>
    </div>

    <!-- Controls -->
    <div class="cyber-controls" id="controls">
      <!-- Row 1: Environment Selection -->
      <div class="control-section">
        <div class="section-label">ENVIRONMENT</div>
        <div class="controls-row">
          <div class="input-group">
            <label for="contextInput">Context:</label>
            <div class="select-container">
              <select id="contextInput" class="cyber-select" onchange="onContextChange()">
                <option value="">Loading...</option>
              </select>
              <div class="select-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </div>
            </div>
          </div>

          <div class="input-group">
            <label for="namespaceInput">Namespace:</label>
            <div class="select-container">
              <select id="namespaceInput" class="cyber-select" onchange="loadProblematicPods()">
                <option value="">Loading...</option>
              </select>
              <div class="select-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </div>
            </div>
          </div>

          <div class="input-group">
            <label for="themeSelect">Theme:</label>
            <div class="select-container">
              <select id="themeSelect" class="cyber-select" onchange="onThemeChange()">
                <option value="cyberpunk">Cyberpunk</option>
                <option value="summer">Summer</option>
                <option value="starwars">Star Wars</option>
                <option value="matrix">Matrix</option>
                <option value="autumn">Autumn</option>
                <option value="crimson">Crimson</option>
              </select>
              <div class="select-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Info row -->
      <div class="control-info">
        <div class="meta" id="countInfo">Loading problematic pods...</div>
        <div class="loading-indicator" id="loadingIndicator">
          <div class="cyber-spinner"></div>
          <span>SYNCING...</span>
        </div>
      </div>
    </div>

    <!-- Vue 3 mount point — renders ProblematicPodsView -->
    <div id="vue-problematic-root" style="margin-top: 24px;"></div>
  </div>

  <!-- Configuration -->
  <script>
    // Set configuration from backend template
    window.PRESETS = {
      dev:  { namespace: "{{DEV_NAMESPACE}}", context: "{{DEV_KUBE_CONTEXT}}" },
      prod: { namespace: "{{PROD_NAMESPACE}}", context: "{{PROD_KUBE_CONTEXT}}" },
    };

    // Log viewer config injected by backend
    window.LOG_PROVIDER = '{{LOG_PROVIDER}}' || '';
    window.LOG_BASE_URL = '{{LOG_BASE_URL}}' || '';
    window.LOG_REPO = '{{LOG_REPO}}' || '';
    window.LOG_DATASOURCE = '{{LOG_DATASOURCE}}' || 'Loki';
    window.LOG_TZ = '{{LOG_TZ}}' || 'UTC';
    window.LOG_START = '{{LOG_START}}' || '7d';
    window.LOG_NAMESPACE = '{{LOG_NAMESPACE}}' || '';
  </script>

  <!-- Main JavaScript Module -->
  <script type="module" src="/dashboard/js/problematic-pods.js?{{JS_HASH}}"></script>

  <!-- Lucide Icons Initialization -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }
    });
  </script>

  <!-- Vue 3 Problematic Pods App -->
  <script type="module" src="/dashboard/js/problematic-pods-app.js?{{JS_HASH}}"></script>
</body>
</html>
